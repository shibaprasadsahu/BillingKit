name: Bump Version & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New version (e.g. 0.1-alpha09)'
        required: true
      base_branch:
        description: 'Branch to bump version on'
        required: true
        default: 'dev'

permissions:
  contents: write

jobs:
  bump:
    name: Bump Version & Tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.inputs.base_branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump VERSION_NAME in gradle.properties
        env:
          NEW_VERSION: ${{ github.event.inputs.version }}
        run: |
          sed -i "s/^VERSION_NAME=.*/VERSION_NAME=${NEW_VERSION}/" gradle.properties
          grep VERSION_NAME gradle.properties

      - name: Commit version bump
        env:
          NEW_VERSION: ${{ github.event.inputs.version }}
        run: |
          git add gradle.properties
          git commit -m "chore: bump version to ${NEW_VERSION}"

      - name: Create and push tag
        env:
          NEW_VERSION: ${{ github.event.inputs.version }}
          BASE_BRANCH: ${{ github.event.inputs.base_branch }}
        run: |
          git tag "${NEW_VERSION}"
          git push origin "${BASE_BRANCH}"
          git push origin "${NEW_VERSION}"
